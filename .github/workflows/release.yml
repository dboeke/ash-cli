name: Release

# Builds, signs, notarizes, and publishes a release when a v* tag is pushed.
#
# IMPORTANT: this runs on a SELF-HOSTED runner. GitHub-hosted macOS runners are
# macOS 14/15 and lack the macOS 26 SDK that FoundationModels needs, so they
# cannot compile ash. Register an Apple Silicon Mac running macOS 26 as a
# self-hosted runner for this repo (Settings > Actions > Runners). See
# RELEASING.md for the required secrets and runner setup.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate into a temporary keychain
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/ash-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          # Allow codesign to use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Write notarization API key
        env:
          NOTARY_KEY_BASE64: ${{ secrets.NOTARY_API_KEY_BASE64 }}
        run: echo "$NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary_key.p8"

      - name: Build, sign, and notarize
        env:
          ASH_SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
          ASH_SIGN_KEYCHAIN: ${{ runner.temp }}/ash-signing.keychain-db
          ASH_NOTARY_KEY: ${{ runner.temp }}/notary_key.p8
          ASH_NOTARY_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          ASH_NOTARY_ISSUER: ${{ secrets.NOTARY_API_ISSUER_ID }}
        run: ./scripts/release.sh "${{ steps.ver.outputs.version }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          ZIP="dist/ash-$V-macos-arm64.zip"
          if gh release view "v$V" >/dev/null 2>&1; then
            gh release upload "v$V" "$ZIP" --clobber
          else
            gh release create "v$V" "$ZIP" --title "ash $V" --generate-notes
          fi

      - name: Clean up signing material
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/notary_key.p8" "$RUNNER_TEMP/cert.p12"
          security delete-keychain "$RUNNER_TEMP/ash-signing.keychain-db" 2>/dev/null || true
